backend:
  name: git-gateway
  branch: main

media_folder: assets
public_folder: /assets
display_url: https://www.qnext.nl

publish_mode: simple

collections:
  - name: "website"
    label: "Website inhoud"
    files:

      - name: "inhoud"
        label: "Website inhoud"
        file: "content.json"
        format: json
        fields:

          # ── Afbeeldingen ──────────────────────────────────────
          - label: "🖼️  Afbeeldingen"
            name: "images"
            widget: "object"
            collapsed: false
            fields:
              - label: "Foto — Over Qnext sectie"
                name: "foto_about"
                widget: "image"
                required: false
                hint: "Aanbevolen: vierkant, minimaal 600×600px"
              - label: "Foto — Over mij sectie"
                name: "foto_jaco"
                widget: "image"
                required: false
                hint: "Aanbevolen: vierkant, minimaal 600×600px"

          # ── Nederlands ────────────────────────────────────────
          - label: "🇳🇱  Nederlandse teksten"
            name: "nl"
            widget: "object"
            collapsed: true
            fields:
              - label: "Hero — ondertitel"
                name: "hero"
                widget: "object"
                collapsed: false
                fields:
                  - label: "Ondertitel"
                    name: "subtitle"
                    widget: "text"
                    hint: "De tekst onder Insight. Action. Growth."

              - label: "Over Qnext"
                name: "about"
                widget: "object"
                collapsed: false
                fields:
                  - {label: "Titel", name: "title", widget: "string"}
                  - {label: "Tagline", name: "tagline", widget: "string"}
                  - {label: "Alinea 1", name: "text1", widget: "text"}
                  - {label: "Alinea 2", name: "text2", widget: "text"}

              - label: "Diensten"
                name: "services"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - {label: "Naam", name: "title", widget: "string"}
                  - {label: "Omschrijving", name: "description", widget: "text"}

              - label: "Over mij (Jaco)"
                name: "jaco"
                widget: "object"
                collapsed: false
                fields:
                  - {label: "Alinea 1", name: "bio1", widget: "text"}
                  - {label: "Alinea 2", name: "bio2", widget: "text"}
                  - label: "Skills"
                    name: "skills"
                    widget: "list"
                    allow_add: true
                    field: {label: "Skill", name: "value", widget: "string"}

              - label: "FAQ"
                name: "faq"
                widget: "list"
                summary: "{{fields.question}}"
                allow_add: true
                fields:
                  - {label: "Vraag", name: "question", widget: "string"}
                  - {label: "Antwoord", name: "answer", widget: "text"}

              - label: "Contact"
                name: "contact"
                widget: "object"
                collapsed: false
                fields:
                  - {label: "Intro tekst", name: "intro", widget: "text"}

          # ── Engels ────────────────────────────────────────────
          - label: "🇬🇧  English texts"
            name: "en"
            widget: "object"
            collapsed: true
            fields:
              - label: "Hero — subtitle"
                name: "hero"
                widget: "object"
                collapsed: false
                fields:
                  - label: "Subtitle"
                    name: "subtitle"
                    widget: "text"
                    hint: "Text below Insight. Action. Growth."

              - label: "About Qnext"
                name: "about"
                widget: "object"
                collapsed: false
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Tagline", name: "tagline", widget: "string"}
                  - {label: "Paragraph 1", name: "text1", widget: "text"}
                  - {label: "Paragraph 2", name: "text2", widget: "text"}

              - label: "Services"
                name: "services"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - {label: "Name", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}

              - label: "About me (Jaco)"
                name: "jaco"
                widget: "object"
                collapsed: false
                fields:
                  - {label: "Paragraph 1", name: "bio1", widget: "text"}
                  - {label: "Paragraph 2", name: "bio2", widget: "text"}
                  - label: "Skills"
                    name: "skills"
                    widget: "list"
                    allow_add: true
                    field: {label: "Skill", name: "value", widget: "string"}

              - label: "FAQ"
                name: "faq"
                widget: "list"
                summary: "{{fields.question}}"
                allow_add: true
                fields:
                  - {label: "Question", name: "question", widget: "string"}
                  - {label: "Answer", name: "answer", widget: "text"}

              - label: "Contact"
                name: "contact"
                widget: "object"
                collapsed: false
                fields:
                  - {label: "Intro text", name: "intro", widget: "text"}
